<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VERA 영업관리팀 대시보드</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-word">VERA</span>
        <span class="brand-sub">영업관리팀 대시보드</span>
      </div>

      <nav class="side-nav" id="side-nav">
        <div class="nav-group" data-key="news">
          <button class="nav-parent" data-key="news" type="button">
            <span>뉴스 스카우트</span>
            <span class="nav-caret">▾</span>
          </button>
          <div class="nav-children" id="news-tree"></div>
        </div>

        <div class="nav-group" data-key="targets">
          <button class="nav-parent" data-key="targets" type="button">
            <span>연락대상</span>
            <span class="nav-caret">▾</span>
          </button>
          <div class="nav-children" id="targets-tree"></div>
        </div>

        <div class="nav-group" data-key="cards">
          <button class="nav-parent nav-leaf" data-key="cards" type="button">
            <span>명함리스트</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-divider"></div>
      <div class="smtp-badge not-ready">공개 데모 · 발송 버튼은 비활성 (실제 발송 안 됨)</div>

      <div class="sidebar-spacer"></div>

      <div id="side-selection" class="side-selection hidden">
        <div class="side-selection-summary">
          <strong id="selection-count">0명</strong>
          <span id="selection-companies">선택된 회사 없음</span>
        </div>
        <div class="side-selection-actions">
          <button id="clear-selection-btn" class="btn btn-ghost btn-sm">해제</button>
          <button id="open-compose-btn" class="btn btn-primary btn-sm">발송 준비</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <header class="content-header">
        <div class="header-text">
          <h1 id="content-title">뉴스 스카우트</h1>
          <p id="content-subtitle" class="content-subtitle"></p>
        </div>
        <input id="search-input" class="search-input" type="search" placeholder="검색" />
      </header>

      <div id="view-body"></div>
    </main>
  </div>

  <div id="compose-overlay" class="overlay hidden">
    <div class="compose-panel">
      <div class="compose-header">
        <h2 id="compose-title">메일 발송</h2>
        <button id="close-compose-btn" class="btn-icon" aria-label="닫기">✕</button>
      </div>

      <div class="compose-body">
        <label class="field">
          <span>받는사람 (To, 쉼표로 구분)</span>
          <input id="compose-to" type="text" placeholder="me@example.com" />
        </label>
        <label class="field">
          <span>참조 (Cc, 선택)</span>
          <input id="compose-cc" type="text" placeholder="" />
        </label>
        <label class="field">
          <span>제목</span>
          <input id="compose-subject" type="text" />
        </label>
        <label class="field">
          <span>본문</span>
          <textarea id="compose-body" rows="14"></textarea>
        </label>
      </div>

      <div id="compose-message" class="compose-message hidden"></div>

      <div class="compose-footer">
        <button id="send-btn" class="btn btn-primary btn-lg">발송 (데모)</button>
      </div>
    </div>
  </div>

  <template id="contact-row-template">
    <tr class="contact-row">
      <td class="col-check"><input type="checkbox" class="contact-checkbox" /></td>
      <td class="contact-name"></td>
      <td class="contact-title"></td>
      <td class="contact-email"></td>
      <td class="contact-lastcontact"></td>
    </tr>
  </template>

  <script src="app.js"></script>
</body>
</html>
